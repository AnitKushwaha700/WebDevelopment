<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cravings-Static</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href=" https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav class="d-flex justify-content-between align-items-center ps-5 pe-5">
        <div id="logo">
          <img
            src="./images/transparentLogoLight-De2Z7I01.png"
            class="w-25 p-2"
            alt="logo"
          />
        </div>
        <div id="btn" class="d-flex fs-5">
          <button class="text-white bg-transparent border border-0">
            Login
          </button>
          <button class="bg-white border border-0 text-danger rounded-1 p-1">
            Register
          </button>
        </div>
      </nav>
    </header>

    <main>
      <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active" data-bs-interval="2000">
            <img
              src="./images/bgImage1-BgVBBcls.jpg"
              class="d-block w-100"
            />
          </div>

          <div class="carousel-item" data-bs-interval="2000">
            <img
              src="./images/bgImage2-CSvQeVNX.jpg"
              class="d-block w-100"
            />
          </div>

          <div class="carousel-item" data-bs-interval="2000">
            <img
              src="./images/bgImage3-BTY6Sz_K.jpg"
              class="d-block w-100"
            />
          </div>
          <div class="carousel-item" data-bs-interval="2000">
            <img
              src="./images/bgImage4-L1QELaMd.jpg"
              class="d-block w-100"
            />
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
