<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WsCube</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
      integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="media.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <header class="container-fluid p-1 shadow-lg position-sticky top-0">
      <div class="container">
        <div class="row align-items-center">
          <figure class="col-lg-6 col-12 text-lg-start mb-0 pb-0">
            <img src="./wscube-logo.jpeg" width="75px" alt="" />
          </figure>

          <div class="col-lg-6">
            <div class="btn-outer d-flex justify-content-end">
              <button class="btn whatsappbtn mr-3">
                <i class="fa-brands fa-whatsapp"></i> Chat with us
              </button>
              <button class="btn call">
                <i class="fa-solid fa-phone"></i> Call us
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <section class="container-fluid py-lg-5 py-sm-4 py-3">
      <div class="container">
        <div class="row justify-content-between">
          <div class="col-lg-6">
            <div class="bannerContent">
              <h1>
                Career Opportuinities <br />
                in <span>Digital Marketting</span>
              </h1>
              <p>Digital Marketting course so good only pay-after-placement</p>

              <ul class="m-0 p-0">
                <li class="mb-3">
                  <i class="fa-solid fa-circle-check"></i> Specialization:
                  Performance Marketting
                </li>
                <li class="mb-3">
                  <i class="fa-solid fa-circle-check"></i> Min Salary of Rs 4.5
                  LPA
                </li>
                <li class="mb-3">
                  <i class="fa-solid fa-circle-check"></i> 50 seats only
                </li>
              </ul>
            </div>
            <div class="bannerContentBtn d-flex">
              <button class="mr-3">Book 2 Days Demo</button>
              <button>
                <i class="bi bi-download"></i> Download Curriculum
              </button>
            </div>
          </div>
          <div class="col-lg-5">
            <form action="" class="bannerForm shadow-lg">
              <h3>Book Your Class Now!</h3>
              <p>2 days of free demo classes without playing in advance!</p>

              <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" />
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" />
              </div>

              <div class="mb-3">
                <div class="input-group">
                  <span class="input-group-text" id="basic-addon1">+91</span>
                  <input
                    type="number"
                    class="form-control"
                    placeholder="Phone"
                  />
                </div>
              </div>

              <div>
                
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <script
      src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
      integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
      integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js"
      integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
