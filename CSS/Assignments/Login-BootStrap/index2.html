<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Login/Register</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="bg-primary">

    <!-- MAIN CONTAINER -->
    <div class="container-fluid vh-100 d-flex justify-content-center align-items-center">

      <!-- ROW -->
      <div class="row w-100 justify-content-center align-items-end g-5">

        <!-- LOGIN -->
        <div class="col-12 col-md-5 col-lg-4">
          <div class="bg-white p-5 rounded-3 d-flex align-items-center h-100">

            <div class="w-100 d-flex flex-column gap-3">
              <h1><u class="link-underline-primary">Lo</u>gin</h1>

              <!-- EMAIL -->
              <div class="input-group border-bottom border-secondary">
                <span class="input-group-text bg-white border-0">
                  <i class="bi bi-envelope fs-5"></i>
                </span>
                <input
                  type="email"
                  class="form-control border-0 shadow-none"
                  placeholder="Enter Your Email"
                />
              </div>

              <!-- PASSWORD -->
              <div class="input-group border-bottom border-secondary">
                <span class="input-group-text bg-white border-0">
                  <i class="bi bi-lock fs-5"></i>
                </span>
                <input
                  type="password"
                  class="form-control border-0 shadow-none"
                  placeholder="Enter Your password"
                />
                <span class="input-group-text bg-white border-0">
                  <i class="bi bi-eye fs-5"></i>
                </span>
              </div>

              <!-- OPTIONS -->
              <div class="d-flex justify-content-between">
                <div>
                  <input type="checkbox" />
                  <span>Remember me</span>
                </div>
                <a href="#" class="text-decoration-none">Forgot password</a>
              </div>

              <!-- BUTTON -->
              <button class="btn btn-primary">Login now</button>

              <!-- FOOTER -->
              <div class="d-flex justify-content-center gap-2">
                <span>Don't have an account ?</span>
                <a href="#" class="text-decoration-none">Sign now</a>
              </div>
            </div>

          </div>
        </div>

        <!-- REGISTRATION -->
        <div class="col-12 col-md-5 col-lg-4">
          <div class="bg-white p-5 rounded-3 d-flex align-items-center h-100">

            <div class="w-100 d-flex flex-column gap-3">
              <h1><u class="link-underline-primary">Reg</u>ister</h1>

              <!-- NAME -->
              <div class="input-group border-bottom border-secondary">
                <span class="input-group-text bg-white border-0">
                  <i class="bi bi-person fs-5"></i>
                </span>
                <input
                  type="text"
                  class="form-control border-0 shadow-none"
                  placeholder="Enter Your name"
                />
              </div>

              <!-- EMAIL -->
              <div class="input-group border-bottom border-secondary">
                <span class="input-group-text bg-white border-0">
                  <i class="bi bi-envelope fs-5"></i>
                </span>
                <input
                  type="email"
                  class="form-control border-0 shadow-none"
                  placeholder="Enter Your Email"
                />
              </div>

              <!-- PASSWORD -->
              <div class="input-group border-bottom border-secondary">
                <span class="input-group-text bg-white border-0">
                  <i class="bi bi-lock fs-5"></i>
                </span>
                <input
                  type="password"
                  class="form-control border-0 shadow-none"
                  placeholder="Create Your password"
                />
                <span class="input-group-text bg-white border-0">
                  <i class="bi bi-eye fs-5"></i>
                </span>
              </div>

              <!-- CONFIRM PASSWORD -->
              <div class="input-group border-bottom border-secondary">
                <span class="input-group-text bg-white border-0">
                  <i class="bi bi-lock fs-5"></i>
                </span>
                <input
                  type="password"
                  class="form-control border-0 shadow-none"
                  placeholder="Confirm Your password"
                />
                <span class="input-group-text bg-white border-0">
                  <i class="bi bi-eye fs-5"></i>
                </span>
              </div>

              <!-- TERMS -->
              <div>
                <input type="checkbox" />
                <span>I accept all terms & conditions</span>
              </div>

              <!-- BUTTON -->
              <button class="btn btn-primary">Register now</button>

              <!-- FOOTER -->
              <div class="d-flex justify-content-center gap-2">
                <span>Already have an account ?</span>
                <a href="#" class="text-decoration-none">Login now</a>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    ></script>

  </body>
</html>
