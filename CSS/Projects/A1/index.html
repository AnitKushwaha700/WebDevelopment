<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login-Figma</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="outerDiv">
      <div class="innerDiv">
        <h1>Login</h1>
        <p>Login to access your travelwise account</p>

        <div class="item1">
          <p>Email</p>
          <input type="email" placeholder="Enter your email" class="input" />
        </div>

        <div class="item">
          <input
            type="password"
            placeholder="Enter your password"
            class="input"
          />
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-eye"
            viewBox="0 0 16 16"
            
          >
            <path
              d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"
            />
            <path
              d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"
            />
          </svg>
        </div>

        <div class="item">
          <input type="checkbox" id="Remember" />
          <label for="Remember">Remember me</label>
          <span>Forgot password</span>
        </div>

        <div class="item">
          <button>Login</button>
        </div>
        Don't have an account?<span>Sign up</span>

        <div class="item">
          <hr class="Hr" />
          <span>Or login with</span>
          <hr class="Hr" />
        </div>

        <div class="item">
          <div class="logo">
            <img src="./facebook-logo.svg" alt="facebook-logo" />
          </div>
          <div class="logo">
            <img src="./google-logo.svg" alt="google-logo" />
          </div>
          <div class="logo">
            <img src="./apple-logo.svg" alt="apple-logo" />
          </div>
        </div>
      </div>

      <div class="innerDiv">
        <img src="./img1.png" alt="image" width="400px" />
      </div>
    </div>
  </body>
</html>
