<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="outerDiv">
      <!-- LEFT IMAGE -->
      <div id="imgDiv">
        <img src="./sign-up.png" alt="signup image" width="500px" class="img" />
      </div>

      <!-- RIGHT FORM -->
      <div class="formDiv">
        <h1>Sign up</h1>
        <p>Let's get you all set up so you can access your personal account.</p>

        <form>
          <!-- NAME -->
          <div class="row">
            <div class="inputBox">
              <label>First Name</label>
              <input type="text" placeholder="Enter First name" />
            </div>

            <div class="inputBox">
              <label>Last Name</label>
              <input type="text" placeholder="Enete Last name" />
            </div>
          </div>

          <!-- EMAIL + PHONE -->
          <div class="row">
            <div class="inputBox">
              <label>Email</label>
              <input type="email" placeholder="Enter your email" />
            </div>

            <div class="inputBox">
              <label>Phone Number</label>
              <input type="tel" placeholder="Phone number" />
            </div>
          </div>

          <!-- PASSWORD -->
          <div class="row">
            <div class="inputBox">
              <label>Password</label>
              <input
                type="password"
                placeholder="Enter password"
                id="password"
              />
            </div>
          </div>
          <div class="row">
            <div class="inputBox">
              <label>Confirm Password</label>
              <input
                type="password"
                placeholder="Confirm password"
                id="password"
              />
            </div>
          </div>

          <!-- CHECKBOX -->
          <div class="checkbox">
            <input type="checkbox" />
            <p>
              I agree to all the<span>Terms</span> and
              <span>Privacy Policies</span>
            </p>
          </div>

          <!-- BUTTON -->
          <button type="submit">Create Account</button>

          <!-- LOGIN LINK -->
          <p class="loginText">
            Already have an account? <a href="login.html">Login</a>
          </p>

          <!-- SOCIAL -->
          <div class="divider">
            <hr />
            <span>Or sign up with</span>
            <hr />
          </div>

          <div class="social">
            <img src="facebook-logo.svg" alt="" />
            <img src="google-logo.svg" alt="" />
            <img src="apple-logo.svg" alt="" />
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
