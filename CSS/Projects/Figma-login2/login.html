<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="outerDiv">
      <div class="leftDiv">
        <img src="./sign-up.png" alt="signup image" />
      </div>

      <div class="rightDiv">
        <h1>Sign up</h1>
        <p id="para">
          Let's get you all set up so you can access your personal account.
        </p>

        <div class="row">
          <div class="item1">
            <label>First Name</label>
            <input type="text" placeholder="Enter First name" />
          </div>

          <div class="item1">
            <label>Last Name</label>
            <input type="text" placeholder="Enete Last name" />
          </div>
        </div>

        <div class="row">
          <div class="item1">
            <label>Email</label>
            <input type="email" placeholder="Enter your email" />
          </div>

          <div class="item1">
            <label>Phone Number</label>
            <input type="tel" placeholder="Phone number" />
          </div>
        </div>

        <div class="row1">
          <div class="item2">
            <label>Password</label>
            <input
              type="password"
              placeholder="Enter password"
              class="password"
            />
          </div>
        </div>
        <div class="row1">
          <div class="item2">
            <label>Confirm Password</label>
            <input
              type="password"
              placeholder="Confirm password"
              class="password"
            />
          </div>
        </div>

        <div id="remember">
          <input type="checkbox" />
          <p>
            I agree to all the <span>Terms</span> and
            <span>Privacy Policies</span>
          </p>
        </div>

        <div class="bottomDiv">
          <div id="btn">
            <button type="submit">Create Account</button>
          </div>

          <p>Already have an account? <a href="login.html">Login</a></p>

          <div id="line">
            <hr />
            <span>Or sign up with</span>
            <hr />
          </div>

          <div class="social">
            <img src="../Figma-login1/apple-logo.svg" alt="" />
            <img src="../Figma-login1/facebook-logo.svg" alt="" />
            <img src="../Figma-login1/google-logo.svg" alt="" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
