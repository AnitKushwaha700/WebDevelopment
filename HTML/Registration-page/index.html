<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
</head>

<body>

  <div>
    <h2>Registration</h2>

    <h3>Personal Details</h3>

    <form>

      <div>
        <label>Full Name</label><br>
        <input type="text" placeholder="Enter your name">
      </div>

      <br>

      <div>
        <label>Date of Birth</label><br>
        <input type="date">
      </div>

      <br>

      <div>
        <label>Email</label><br>
        <input type="email" placeholder="Enter your email">
      </div>

      <br>

      <div>
        <label>Mobile Number</label><br>
        <input type="text" placeholder="Enter mobile number">
      </div>

      <br>

      <div>
        <label>Gender</label><br>
        <input type="text" placeholder="Enter your gender">
      </div>

      <br>

      <div>
        <label>Occupation</label><br>
        <input type="text" placeholder="Enter occupation">
      </div>

      <br>

      <h3>Identity Details</h3>

      <div>
        <label>ID Type</label><br>
        <input type="text" placeholder="Enter ID type">
      </div>

      <br>

      <div>
        <label>ID Number</label><br>
        <input type="text" placeholder="Enter ID number">
      </div>

      <br>

      <div>
        <label>Issue Authority</label><br>
        <input type="text" placeholder="Enter issue authority">
      </div>

      <br>

      <div>
        <label>Issue Date</label><br>
        <input type="date">
      </div>

      <br>

      <div>
        <label>Issue State</label><br>
        <input type="text" placeholder="Enter issue state">
      </div>

      <br>

      <div>
        <label>Expiry Date</label><br>
        <input type="date">
      </div>

      <br>

      <button type="submit">Next →</button>

    </form>
  </div>

</body>
</html>
