<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Login Page</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="h-screen flex justify-center items-center bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"
  >
    <!-- Login Card -->
    <div
      class="bg-white/20 backdrop-blur-lg border border-white/30 shadow-2xl rounded-3xl p-8 w-96"
    >
      <!-- Heading -->
      <div class="text-center mb-6">
        <h1 class="text-4xl font-bold text-white">Welcome Back</h1>
        <p class="text-white/80 mt-2">Login to continue</p>
      </div>

      <!-- Username -->
      <div class="mb-4">
        <input
          type="text"
          id="username"
          placeholder="Enter Username"
          class="w-full p-3 rounded-xl bg-white/30 text-white placeholder-white/70 outline-none border border-white/40 focus:ring-2 focus:ring-white"
        />
      </div>

      <!-- Password -->
      <div class="mb-4">
        <input
          type="password"
          id="password"
          placeholder="Enter Password"
          class="w-full p-3 rounded-xl bg-white/30 text-white placeholder-white/70 outline-none border border-white/40 focus:ring-2 focus:ring-white"
        />
      </div>

      <!-- Remember + Forgot -->
      <div class="flex justify-between items-center text-sm text-white mb-5">
        <label>
          <input type="checkbox" class="mr-1" />
          Remember me
        </label>

        <a href="#" class="hover:underline">Forgot Password?</a>
      </div>

      <!-- Button -->
      <button
        id="loginBtn"
        class="w-full bg-white text-purple-600 font-bold p-3 rounded-xl hover:scale-105 transition duration-300"
      >
        Login
      </button>

      <!-- Message -->
      <p id="message" class="text-center mt-5 font-semibold"></p>

      <!-- Bottom Text -->
      <p class="text-center text-white/80 mt-6">
        Don't have an account?
        <span class="font-bold cursor-pointer hover:underline">
          Sign Up
        </span>
      </p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
