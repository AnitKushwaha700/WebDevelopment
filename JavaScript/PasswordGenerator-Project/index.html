<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4 rounded-4" style="width: 500px;">
        <h1 class="text-center mb-4 text-primary">Password Generator</h1>

        <div class="mb-3">
            <label class="form-label fw-bold">Password Length</label>
            <input 
                type="number" 
                id="length" 
                class="form-control"
                placeholder="Enter password length"
            >
        </div>

        <button 
            onclick="generatePassword()" 
            class="btn btn-primary w-100 mb-3"
        >
            Generate Password
        </button>

        <div class="mb-3">
            <label class="form-label fw-bold">Generated Password</label>
            <input 
                type="text" 
                id="password" 
                class="form-control text-center fw-bold"
                readonly
                placeholder="Your password will appear here"
            >
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
