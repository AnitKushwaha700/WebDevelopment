<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>
  </head>
  <body>
    <div>
      <div>
        <input type="text" id="fullName" placeholder="Enter Your Name" />
        <span class="nameError" class="error"></span>
      </div>
      <div>
        <input type="number" id="phone" placeholder="Enter Your Number" />
        <span class="phoneError" class="error"></span>
    </div>
    <div>
        <input type="email" id="email" placeholder="Enter Your Email" />
        <span class="emailError" class="error"></span>
    </div>
    <div>
        <input type="password" id="pass" placeholder="*****************" />
        <span class="passwordError" class="error"></span>
      </div>

      <button onclick="Submit()">Submit</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
