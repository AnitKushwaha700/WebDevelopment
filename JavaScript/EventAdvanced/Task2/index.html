<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Advanced</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="d-flex justify-content-center align-items-center vh-100">
    <form
      class="bg-info w-100px h-100px p-5 rounded-3 d-grid gap-3"
    >
      <div class="d-flex justify-content-between">
        <label for="fullname" class="fs-5">Full Name :</label>
        <input type="text" name="fullname" id="fullname" class="rounded-2 p-1"/>
      </div>

      <div class="d-flex justify-content-between">
        <label for="email" class="fs-5">Full email :</label>
        <input type="email" name="email" id="email" class="rounded-2 p-1"/>
      </div>

      <div class="d-flex justify-content-between">
        <label for="password" class="fs-5 pe-3">Full password : </label>
        <input type="password" name="password" id="password" class="rounded-2 p-1" />
      </div>

      <div class="d-flex justify-content-center gap-5 mt-4">
        <button type="submit" class="bg-primary fs-5 border-0 rounded-2 px-3 py-2 text-white">Submit</button>
        <button type="reset" class="bg-danger fs-5 border-0 rounded-2 px-3 py-2 text-white">Cancel</button>
      </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="script.js"></script>
  </body>
</html>
