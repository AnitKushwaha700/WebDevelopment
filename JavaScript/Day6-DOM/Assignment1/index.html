<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Example</title>

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body
    class="d-flex justify-content-center align-items-center vh-100 bg-light"
  >
    <div class="form-box p-4 bg-white border border-2 rounded-3">
      <h4 class="text-center">Form</h4>

      <input
        type="text"
        id="name"
        placeholder="Enter Name"
        class="form-control mb-2"
      />
      <input
        type="text"
        id="city"
        placeholder="Enter City"
        class="form-control mb-2"
      />

      <button onclick="submit()" class="btn btn-primary w-100">Submit</button>

      <div class="container border p-4 shadow d-grid gap-2 mt-3 rounded-3 divHide" id="dataCard">
        <span id="myName">Name :</span>
        <span id="myCity">city :</span>
      </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
