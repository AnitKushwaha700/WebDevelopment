<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practice App</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container{
            width: 400px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            margin-bottom: 20px;
        }

        .box{
            display: flex;
            gap: 10px;
        }

        input{
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
        }

        button{
            padding: 10px 15px;
            border: none;
            background: blue;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        ul{
            margin-top: 20px;
            list-style: none;
        }

        li{
            background: #eee;
            padding: 10px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            border-radius: 5px;
        }

        .delete{
            background: red;
            padding: 5px 10px;
            font-size: 12px;
        }

        .msg{
            margin-top: 10px;
            color: gray;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">DOM Task App</h1>

        <div class="box">
            <input type="text" id="taskInput" placeholder="Enter task">
            <button id="addBtn">Add</button>
        </div>

        <p class="msg">No Tasks Available</p>
        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
