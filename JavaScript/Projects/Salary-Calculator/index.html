<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="w-25 bg-light rounded shadow border mx-auto mt-5 p-4">
      <h1 class="text-center mb-3 fs-3 bg-primary rounded text-white p-3">
        Salary Calculator
      </h1>

      <form
        class="d-flex flex-column align-items-center p-3 gap-5 justify-content-center"
      >
        <input type="number" name="DOB" id="CurrentDate" class="form-control border border-primary border-2" />
        <button type="submit" class="btn btn-danger" onclick="CalculateSalary">
          Calculate Gross Salary
        </button>
      </form>

      <div class="fw-bold text-center p-2">
        Salary is :
        <p id="mySalary"></p>
        HRA :
        <p id="mySalary"></p>
        DA :
        <p id="mySalary"></p>
        Gross Salary :
        <p id="mySalary"></p>
      </div>
    </div>

    <!-- BootStrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
