<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess Number Game</title>

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow-lg text-center" style="width: 400px;">
      
      <h1 class="mb-3">🎯 Guess Number</h1>

      <p class="text-muted">
        Guess a number between <b>1 to 100</b>
      </p>

      <input
        type="number"
        id="guessInput"
        class="form-control mb-3"
        placeholder="Enter your number"
      />

      <button class="btn btn-primary w-100 mb-3" id="checkBtn">
        Check Guess
      </button>

      <h5 id="message">Start Guessing...</h5>

      <p class="mt-3">
        Attempts: <span id="attempts">0</span>
      </p>

      <button class="btn btn-danger w-100" id="restartBtn">
        Restart Game
      </button>

    </div>

    <script>
      // Random Number Generate
      let randomNumber = Math.floor(Math.random() * 100) + 1;

      let totalAttempts = 0;

      // Buttons
      const checkBtn = document.getElementById("checkBtn");
      const restartBtn = document.getElementById("restartBtn");

      // Event -> Check Guess
      checkBtn.addEventListener("click", () => {

        const userGuess = Number(
          document.getElementById("guessInput").value
        );

        totalAttempts++;

        document.getElementById("attempts").innerText = totalAttempts;

        const message = document.getElementById("message");

        // Validation
        if (!userGuess) {
          message.innerText = "⚠ Please enter a number!";
        }

        // Correct Guess
        else if (userGuess === randomNumber) {
          message.innerText =
            `🎉 Correct! Number was ${randomNumber}`;
          message.classList.add("text-success");
        }

        // Too High
        else if (userGuess > randomNumber) {
          message.innerText = "📈 Too High!";
          message.classList.add("text-danger");
        }

        // Too Low
        else {
          message.innerText = "📉 Too Low!";
          message.classList.add("text-warning");
        }
      });

      // Restart Game
      restartBtn.addEventListener("click", () => {

        randomNumber = Math.floor(Math.random() * 100) + 1;

        totalAttempts = 0;

        document.getElementById("attempts").innerText = 0;

        document.getElementById("message").innerText =
          "Start Guessing...";

        document.getElementById("guessInput").value = "";
      });
    </script>
  </body>
</html>
