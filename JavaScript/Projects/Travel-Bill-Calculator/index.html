<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Bill Calculator</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
</head>

<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-lg rounded-4 border-0" style="width: 450px;">

            <!-- Header -->
            <div class="card-header bg-primary text-white text-center rounded-top-4 py-3">
                <h2 class="mb-0">🚗 Travel Bill Calculator</h2>
            </div>

            <!-- Body -->
            <div class="card-body p-4">

                <!-- Input -->
                <div class="mb-3">
                    <label class="form-label fw-bold">
                        Enter Kilometers Covered
                    </label>

                    <input
                        type="number"
                        id="kmInput"
                        class="form-control form-control-lg"
                        placeholder="Enter kilometers"
                    />

                    <!-- Error Message -->
                    <div id="error" class="text-danger mt-2 fw-semibold"></div>
                </div>

                <!-- Button -->
                <button
                    id="calculateBtn"
                    class="btn btn-primary w-100 py-2 fw-bold"
                >
                    Calculate Bill
                </button>

                <!-- Result -->
                <div
                    id="resultSection"
                    class="mt-4 p-3 border rounded-3 bg-light d-none"
                >
                    <h4 class="text-primary fw-bold">
                        Total Bill = ₹<span id="totalBill"></span>
                    </h4>

                    <hr />

                    <h5 class="fw-bold">Calculation Breakdown</h5>

                    <div
                        id="breakdown"
                        class="text-secondary small"
                    ></div>
                </div>

            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="script.js"></script>

</body>
</html>
