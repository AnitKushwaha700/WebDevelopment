<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip-Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="vh-100 d-flex justify-content-center align-items-center">
    <div class="w-25 bg-primary rounded shadow border mx-auto p-4">
      <h1 class="text-center mb-2 rounded-top-5 bg-warning text-white fs-5 p-3">
        TIP CALCULATOR
      </h1>

      <form class="border border-2 p-3 rounded-3 bg-white">
        <div class="d-grid">
          <label for="billAmount">Bill Amount</label>
          <div class="d-flex form-control justify-content-between border-top ">
            <input
              type="number"
              name="billAmount"
              pattern="[0-9]+"
              class="border-0 w-100"
              placeholder="Amount to be paid"
              id="Amount"
            />
            <i class="bi bi-currency-rupee"></i>
          </div>
        </div>
        <div class="d-grid">
          <label for="dropDown">How was the service?</label>
          <select id="dropDown form-control">
            <option>Select</option>
            <option>25% - Top Notch</option>
            <option>20% - Excellent</option>
            <option>15% - Good</option>
            <option>10% - Bad</option>
            <option>5% - Worst</option>
          </select>
        </div>
        <div>
          <label for="numberPersons">Total number of persons</label>
          <input
            type="number"
            placeholder="Number of people sharing the bill"
            class="form-control"
            id="numberPersons"
          />
        </div>
        <button id="submit" class="bg-info p-2 px-3 text-white border-0 my-3">Calculate</button>
      </form>
    </div>

    <!-- BootStrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
