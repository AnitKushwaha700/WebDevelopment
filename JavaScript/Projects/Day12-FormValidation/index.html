<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form-Validation</title>
  </head>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
  />
  <body>
    <div class="card vh-100 vw-100 d-flex justify-content-center align-items-center text-center">
      <div class="border border-1 border-black w-25 h-25 justify-content-center align-content-center">
        <div>
          <input type="text" id="fullName" placeholder="Enter Your Name" />
          <span class="nameError" class="error"></span>
        </div>
        <div>
          <input type="number" id="phone" placeholder="Enter Your Number" />
          <span class="phoneError" class="error"></span>
        </div>
        <div>
          <input type="email" id="email" placeholder="Enter Your Email" />
          <span class="emailError" class="error"></span>
        </div>
        <div>
          <input type="password" id="pass" placeholder="*****************" />
          <span class="passwordError" class="error"></span>
        </div>

        <button class="btn btn-primary" onclick="Submit()">Submit</button>
      </div>
    </div>

    <!-- BootStrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
