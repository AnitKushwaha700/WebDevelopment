<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body
style="
    background-image: linear-gradient(
        rgba(255,255,255,0.45),
        rgba(255,255,255,0.45)
    ),
    url('https://images.unsplash.com/photo-1501973801540-537f08ccae7b');
    background-size: cover;
    background-position: center;
    min-height: 100vh;
;"
>

<div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-8 col-lg-6">

            <!-- Main Card -->
            <div
                class="card border-0 shadow-lg rounded-5 p-4"
                style="
                    background: rgba(255,255,255,0.90);
                    backdrop-filter: blur(8px);
                "
            >

                <!-- Title -->
                <h2 class="text-center text-primary fw-bold mb-4">
                    🌤 Weather Dashboard
                </h2>

                <!-- Search -->
                <div class="input-group mb-4">
                    <input
                        type="text"
                        id="cityName"
                        class="form-control rounded-start-pill py-3"
                        placeholder="Search city..."
                    >

                    <button
                        class="btn btn-primary px-4 rounded-end-pill"
                        onclick="getWeather()"
                    >
                        Search
                    </button>
                </div>

                <!-- Weather Main -->
                <div class="text-center mb-4">
                    <div style="font-size:70px;">☁️</div>

                    <h3 id="cityText" class="fw-bold text-dark">
                        Your City
                    </h3>

                    <h1
                        class="display-2 fw-bold text-primary"
                    >
                        <span id="Tempearture">--</span>°C
                    </h1>

                    <h5 id="weatherType" class="text-secondary">
                        Clear Sky
                    </h5>
                </div>

                <!-- Stats -->
                <div class="row g-3 text-center">

                    <div class="col-6">
                        <div
                            class="card shadow-sm border-0 rounded-4 p-3"
                        >
                            <h6 class="text-muted">Humidity</h6>
                            <h4 id="humidity">--%</h4>
                        </div>
                    </div>

                    <div class="col-6">
                        <div
                            class="card shadow-sm border-0 rounded-4 p-3"
                        >
                            <h6 class="text-muted">Feels Like</h6>
                            <h4 id="feelsLike">--°C</h4>
                        </div>
                    </div>

                    <div class="col-6">
                        <div
                            class="card shadow-sm border-0 rounded-4 p-3"
                        >
                            <h6 class="text-muted">Wind Speed</h6>
                            <h4 id="windSpeed">--</h4>
                        </div>
                    </div>

                    <div class="col-6">
                        <div
                            class="card shadow-sm border-0 rounded-4 p-3"
                        >
                            <h6 class="text-muted">Pressure</h6>
                            <h4 id="pressure">--</h4>
                        </div>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
