<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Currency Converter</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body style="background:#eef2f7; min-height:100vh;">

<!-- Header -->
<div class="container-fluid bg-dark py-3 shadow-sm">
  <h2 class="text-center text-white fw-bold mb-0">
    Currency Converter
  </h2>
</div>

<!-- Main -->
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7 col-md-9">

      <div class="card shadow-lg border-0 rounded-4 p-4 bg-white">

        <!-- Flags -->
        <div class="row text-center g-4">

          <!-- From -->
          <div class="col-md-5">
            <img
              id="flag1"
              src=""
              width="75"
              height="50"
              class="rounded border shadow-sm mb-2"
            >
            <select
              id="country1"
              class="form-select"
            >
              <option>Select Country</option>
            </select>
          </div>

          <!-- Swap -->
          <div
            class="col-md-2 d-flex justify-content-center align-items-center"
          >
            <button
              id="swapBtn"
              class="btn btn-outline-primary rounded-circle px-3 py-2 fw-bold"
            >
              ⇄
            </button>
          </div>

          <!-- To -->
          <div class="col-md-5">
            <img
              id="flag2"
              src=""
              width="75"
              height="50"
              class="rounded border shadow-sm mb-2"
            >
            <select
              id="country2"
              class="form-select"
            >
              <option>Select Country</option>
            </select>
          </div>

        </div>

        <!-- Amount -->
        <div class="mt-4">
          <label class="form-label fw-semibold">
            Enter Amount
          </label>
          <input
            type="number"
            id="orgAmount"
            class="form-control py-2"
            placeholder="Enter amount"
          >
        </div>

        <!-- Convert -->
        <div class="d-grid mt-4">
          <button
            id="convertBtn"
            class="btn btn-success py-2 fw-bold"
          >
            Convert
          </button>
        </div>

        <!-- Loading -->
        <div class="text-center mt-3">
          <span
            id="loading"
            class="text-primary fw-semibold"
          ></span>
        </div>

        <!-- Error -->
        <div class="text-center mt-2">
          <small
            id="errorMessage"
            class="text-danger fw-semibold"
          ></small>
        </div>

        <!-- Result -->
        <div
          class="card mt-4 border-0 bg-light text-center p-4 rounded-4 shadow-sm"
        >
          <h6 class="text-muted mb-2">
            Converted Amount
          </h6>

          <h2
            id="newAmount"
            class="fw-bold text-success mb-1"
          >
            0.00
          </h2>

          <small
            id="exchangeRate"
            class="text-muted"
          ></small>
        </div>

      </div>

    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
