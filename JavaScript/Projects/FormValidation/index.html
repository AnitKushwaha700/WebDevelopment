<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">

    <div class="container vh-100 d-flex justify-content-center align-items-center">

      <form
        id="registrationForm"
        class="card p-4 shadow w-50"
      >

        <h2 class="text-center mb-4">
          Registration Form
        </h2>

        <!-- Full Name -->
        <div class="mb-3">
          <label class="form-label">
            Full Name
          </label>

          <input
            type="text"
            id="fullName"
            class="form-control"
            placeholder="Enter Your Name"
          />

          <div class="invalid-feedback">
            Invalid Full Name
          </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">
            Email
          </label>

          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="Enter Your Email"
          />

          <div class="invalid-feedback">
            Invalid Email
          </div>
        </div>

        <!-- Mobile Number -->
        <div class="mb-3">
          <label class="form-label">
            Mobile Number
          </label>

          <input
            type="number"
            id="number"
            class="form-control"
            placeholder="Enter Mobile Number"
          />

          <div class="invalid-feedback">
            Enter 10 digit number
          </div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label">
            Password
          </label>

          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="********"
          />

          <div class="invalid-feedback">
            Password must be 6 characters
          </div>
        </div>

        <!-- Buttons -->
        <div class="text-center">
          <button
            type="submit"
            class="btn btn-primary px-4"
          >
            Submit
          </button>

          <button
            type="reset"
            class="btn btn-danger px-4 ms-2"
          >
            Reset
          </button>
        </div>

      </form>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS File -->
    <script src="script.js"></script>

  </body>
</html>
