<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body
    style="
        background-image: url('https://images.unsplash.com/photo-1501973801540-537f08ccae7b');
        background-size: cover;
        background-position: center;
        min-height: 100vh;
    "
>

    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow-lg p-4 rounded-4" style="width: 400px;">

            <h2 class="text-center text-primary mb-4">Weather App</h2>

            <div class="input-group mb-4">
                <input
                    type="text"
                    id="cityName"
                    class="form-control"
                    placeholder="Enter city name"
                >
                <button
                    class="btn btn-primary"
                    onclick="getWeather()"
                >
                    Search
                </button>
            </div>

            <div class="text-center">
                <h4 id="cityText">Your City</h4>
                <h1 class="display-4">
                    <span id="Tempearture">--</span>°C
                </h1>
                <p>Humidity: <span id="humidity">--</span>%</p>
                <p>Feels Like: <span id="feelsLike">--</span>°C</p>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
