<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tip-Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      class="vw-100 vh-100 d-flex justify-content-center align-items-center"
      id="imgDiv"
    >
      <div class="rounded-4 border-1 border bg-white p-2 d-grid gap-2">
        <div class="border border-1 rounded-top-4 TopDiv px-5 py-4 text-end">
           <label for="text" class="fs-3" id="text">0</label>
        </div>

        <div
          class="BottomDiv border border-1 rounded-bottom-4 w-100 p-4 d-grid gap-3"
        >
          <div class="d-flex justify-content-center gap-4">
            <button class="p-2 btnn" onclick="Calculate('AC')">AC</button>
            <button class="btnn" onclick="Calculate('C')">C</button>
            <button class="btnn" onclick="Calculate('%')">%</button>
            <button class="oprBtn" onclick="Calculate('/')">/</button>
          </div>
          <div class="d-flex justify-content-center gap-4">
            <button class="btnn" onclick="Calculate('7')">7</button>
            <button class="btnn" onclick="Calculate('8')">8</button>
            <button class="btnn" onclick="Calculate('9')">9</button>
            <button class="oprBtn" onclick="Calculate('*')">*</button>
          </div>
          <div class="d-flex justify-content-center gap-4">
            <button class="btnn" onclick="Calculate('4')">4</button>
            <button class="btnn" onclick="Calculate('5')">5</button>
            <button class="btnn" onclick="Calculate('6')">6</button>
            <button class="oprBtn" onclick="Calculate('-')">-</button>
          </div>
          <div class="d-flex justify-content-center gap-4">
            <button class="btnn" onclick="Calculate('1')">1</button>
            <button class="btnn" onclick="Calculate('2')">2</button>
            <button class="btnn" onclick="Calculate('3')">3</button>
            <button class="oprBtn" onclick="Calculate('+')">+</button>
          </div>
          <div class="d-flex justify-content-center gap-4">
            <button class="btnn" onclick="Calculate('0')">0</button>
            <button class="btnn" onclick="Calculate('.')">.</button>
            <button class="submitBtn border rounded-5 fs-3 w-50 bg-gradient" onclick="Calculate('=')">=</button>
          </div>
        </div>
      </div>
    </div>

    <!-- BootStrap Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
