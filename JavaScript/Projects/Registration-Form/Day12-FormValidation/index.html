<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">

    <!-- Header -->
    <header>
      <h1 class="bg-primary text-white text-center py-3">
        Registration Form
      </h1>
    </header>

    <!-- Main -->
    <main class="container my-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">

          <form id="registrationForm" class="card shadow p-4">

            <!-- Personal Details -->
            <div class="card p-4 mb-4">
              <h3 class="text-center mb-4">
                Personal Details
              </h3>

              <div class="mb-3">
                <label class="form-label">
                  Full Name
                </label>

                <input
                  type="text"
                  id="fullName"
                  class="form-control"
                  placeholder="Enter your full name"
                />
              </div>

              <div class="mb-3">
                <label class="form-label">
                  Email Address
                </label>

                <input
                  type="email"
                  id="email"
                  class="form-control"
                  placeholder="Enter your email"
                />
              </div>

              <div class="mb-3">
                <label class="form-label">
                  Mobile Number
                </label>

                <input
                  type="number"
                  id="number"
                  class="form-control"
                  placeholder="Enter mobile number"
                />
              </div>

              <div class="mb-3">
                <label class="form-label">
                  Date of Birth
                </label>

                <input
                  type="date"
                  id="DOB"
                  class="form-control"
                />
              </div>

              <div>
                <label class="form-label d-block">
                  Gender
                </label>

                <div class="form-check form-check-inline">
                  <input
                    type="radio"
                    name="gender"
                    value="Male"
                    id="male"
                    class="form-check-input"
                  />

                  <label
                    for="male"
                    class="form-check-label"
                  >
                    Male
                  </label>
                </div>

                <div class="form-check form-check-inline">
                  <input
                    type="radio"
                    name="gender"
                    value="Female"
                    id="female"
                    class="form-check-input"
                  />

                  <label
                    for="female"
                    class="form-check-label"
                  >
                    Female
                  </label>
                </div>

                <div class="form-check form-check-inline">
                  <input
                    type="radio"
                    name="gender"
                    value="Other"
                    id="other"
                    class="form-check-input"
                  />

                  <label
                    for="other"
                    class="form-check-label"
                  >
                    Other
                  </label>
                </div>
              </div>
            </div>

            <!-- Academic Details -->
            <div class="card p-4 mb-4">
              <h3 class="text-center mb-4">
                Academic Details
              </h3>

              <div class="mb-3">
                <label class="form-label">
                  Qualification
                </label>

                <select
                  id="Qualification"
                  class="form-select"
                >
                  <option value="">Select</option>
                  <option value="10th">10th</option>
                  <option value="12th">12th</option>
                  <option value="Graduation">
                    Graduation
                  </option>
                  <option value="Post Graduation">
                    Post Graduation
                  </option>
                </select>
              </div>

              <div>
                <label class="form-label">
                  Grade
                </label>

                <select
                  id="Grade"
                  class="form-select"
                >
                  <option value="">Select</option>
                  <option value="A+">A+</option>
                  <option value="A">A</option>
                  <option value="B">B</option>
                  <option value="C">C</option>
                  <option value="D">D</option>
                </select>
              </div>
            </div>

            <!-- Course Information -->
            <div class="card p-4 mb-4">
              <h3 class="text-center mb-4">
                Course Information
              </h3>

              <div class="mb-3">
                <label class="form-label">
                  Preferred Course
                </label>

                <select
                  id="Course"
                  class="form-select"
                >
                  <option value="">Select</option>
                  <option value="IIT-JEE">
                    IIT-JEE
                  </option>
                  <option value="NEET">
                    NEET
                  </option>
                  <option value="Banking">
                    Banking
                  </option>
                  <option value="UPSC">
                    UPSC
                  </option>
                </select>
              </div>

              <div>
                <label class="form-label d-block">
                  Batch Timings
                </label>

                <div class="form-check">
                  <input
                    type="checkbox"
                    name="timings"
                    value="Morning"
                    id="morning"
                    class="form-check-input"
                  />

                  <label
                    for="morning"
                    class="form-check-label"
                  >
                    Morning
                  </label>
                </div>

                <div class="form-check">
                  <input
                    type="checkbox"
                    name="timings"
                    value="Afternoon"
                    id="afternoon"
                    class="form-check-input"
                  />

                  <label
                    for="afternoon"
                    class="form-check-label"
                  >
                    Afternoon
                  </label>
                </div>

                <div class="form-check">
                  <input
                    type="checkbox"
                    name="timings"
                    value="Evening"
                    id="evening"
                    class="form-check-input"
                  />

                  <label
                    for="evening"
                    class="form-check-label"
                  >
                    Evening
                  </label>
                </div>

                <div class="form-check">
                  <input
                    type="checkbox"
                    name="timings"
                    value="Weekend"
                    id="weekend"
                    class="form-check-input"
                  />

                  <label
                    for="weekend"
                    class="form-check-label"
                  >
                    Weekend
                  </label>
                </div>
              </div>
            </div>

            <!-- Address -->
            <div class="card p-4 mb-4">
              <h3 class="text-center mb-4">
                Address
              </h3>

              <div class="mb-3">
                <label class="form-label">
                  Residential Address
                </label>

                <textarea
                  id="Address"
                  rows="3"
                  class="form-control"
                  placeholder="Enter your address"
                ></textarea>
              </div>

              <div class="mb-3">
                <label class="form-label">
                  City
                </label>

                <input
                  type="text"
                  id="City"
                  class="form-control"
                  placeholder="Enter your city"
                />
              </div>

              <div>
                <label class="form-label">
                  Pin Code
                </label>

                <input
                  type="number"
                  id="pinCode"
                  class="form-control"
                  placeholder="Enter pin code"
                />
              </div>
            </div>

            <!-- Guardian Details -->
            <div class="card p-4 mb-4">
              <h3 class="text-center mb-4">
                Guardian Details
              </h3>

              <div class="mb-3">
                <label class="form-label">
                  Guardian Name
                </label>

                <input
                  type="text"
                  id="guardianName"
                  class="form-control"
                  placeholder="Enter guardian name"
                />
              </div>

              <div>
                <label class="form-label">
                  Guardian Number
                </label>

                <input
                  type="number"
                  id="guardianNumber"
                  class="form-control"
                  placeholder="Enter guardian number"
                />
              </div>
            </div>

            <!-- Additional Information -->
            <div class="card p-4 mb-4">
              <h3 class="text-center mb-4">
                Additional Information
              </h3>

              <div class="mb-3">
                <label class="form-label">
                  Reference
                </label>

                <select
                  id="reference"
                  class="form-select"
                >
                  <option value="">Select</option>
                  <option value="Friends">
                    Friends
                  </option>
                  <option value="Online Ad">
                    Online Ad
                  </option>
                  <option value="Newspaper">
                    Newspaper
                  </option>
                  <option value="Social Media">
                    Social Media
                  </option>
                </select>
              </div>

              <div>
                <label class="form-label">
                  Special Requirements
                </label>

                <textarea
                  id="specialRequirements"
                  rows="3"
                  class="form-control"
                  placeholder="Write here..."
                ></textarea>
              </div>
            </div>

            <!-- Buttons -->
            <div class="text-center">
              <button
                type="submit"
                class="btn btn-primary px-4 me-3"
              >
                Submit
              </button>

              <button
                type="reset"
                class="btn btn-danger px-4"
              >
                Reset
              </button>
            </div>

          </form>

        </div>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS File -->
    <script src="script.js"></script>

  </body>
</html>
