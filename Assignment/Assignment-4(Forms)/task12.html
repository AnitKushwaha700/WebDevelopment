<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>

   <body>

    <h2 align="center">Doctor Appointment Form</h2>
    <hr>

    <form>

        <table cellpadding="5">

            <tr>
                <td>Appointment Date</td>
                <td><input type="date"></td>
            </tr>

            <tr>
                <td>Appointment Time</td>
                <td><input type="time"></td>
            </tr>

            <tr>
                <td>Name</td>
                <td>
                    <input type="text" placeholder="First">
                    <input type="text" placeholder="Last">
                </td>
            </tr>

            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                </td>
            </tr>

            <tr>
                <td>Phone</td>
                <td><input type="tel"></td>
            </tr>

            <tr>
                <td>Address</td>
                <td>
                    <input type="text" placeholder="City">
                    <input type="text" placeholder="State">
                </td>
            </tr>

            <tr>
                <td>Your Query</td>
                <td><textarea rows="4" cols="40"></textarea></td>
            </tr>

            <tr>
                <td>Appointment Type</td>
                <td>
                    Select which appointment type(s) you require<br><br>

                    <input type="checkbox"> Cervix checkup<br>
                    <input type="checkbox"> Heart checkup<br>
                    <input type="checkbox"> Eye check-up<br>
                    <input type="checkbox"> Hearing Test<br><br>

                    <input type="submit" value="Send">
                </td>
            </tr>

        </table>

    </form>

</body>
</html>
