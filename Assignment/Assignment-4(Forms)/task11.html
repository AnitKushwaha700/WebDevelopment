<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Task 11:</h1>

    <form>
      <table border="1" cellspacing="2">
        <tr>
          <th colspan="4">Registration Form</th>
        </tr>

        <tr>
          <th>Student Name</th>
          <td><input type="text" placeholder="First Name" /></td>
          <td><input type="text" placeholder="Middle Name" /></td>
          <td><input type="text" placeholder="Last Name" /></td>
        </tr>

        <tr>
          <th>Father's Name</th>
          <td><input type="text" placeholder="Enter your Father's Name" /></td>
          <th>Mother's Name</th>
          <td><input type="text" placeholder="Enter your Mother's Name" /></td>
        </tr>

        <tr>
          <th>Date of Birth</th>
          <td><input type="date" /></td>
          <th>Gender</th>
          <td>
            <input type="radio" name="gender" value="male" /> Male
            <input type="radio" name="gender" value="female" /> Female
          </td>
        </tr>

        <tr>
          <th>Category</th>
          <td>
            Gen <input type="radio" /> OBC <input type="radio" /> SC/ST
            <input type="radio" />
          </td>

          <th>Handicapped</th>
          <td>
            <input type="checkbox" name="handicapped" value="yes" /> Yes
            <input type="checkbox" name="handicapped" value="no" /> No
          </td>
        </tr>

        <tr>
          <th>Email ID</th>
          <td><input type="email" /></td>
          <th>Mobile No.</th>
          <td><input type="tel" /></td>
        </tr>

        <tr>
          <th>State</th>
          <td>
            <select>
              <option value="">select any one</option>
              <option value="MP">MP</option>
              <option value="UP">UP</option>
            </select>
          </td>

          <th>City</th>
          <td>
            <select>
              <option value="">select any one</option>
              <option value="Satna">Satna</option>
              <option value="Rewa">Rewa</option>
            </select>
          </td>
        </tr>

        <tr>
          <th>Upload Photo</th>
          <td><button type="button">browse..</button>No file selected.</td>

          <th>Upload Signature</th>
          <td><button type="button">browse..</button>No file selected.</td>
        </tr>

        <tr>
          <td></td>
          <th colspan="3"><button type="submit">Submit</button></th>
        </tr>
      </table>
    </form>
  </body>
</html>
